<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animations & UI Feedback</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        keyframes: {
          fadeup: {
            '0%': { opacity: 0, transform: 'translateY(15px)' },
            '100%': { opacity: 1, transform: 'translateY(0)' }
          }
        },
        animation: {
          fadeup: 'fadeup 0.5s ease forwards'
        }
      }
    }
  }
</script>
</head>
<body class="bg-gray-100 text-gray-800 p-6">
<h1 class="text-2xl font-bold text-center">Animations & UI Feedback</h1>
<p class="text-center text-gray-500 mb-8">hover, click or wait to see the animations</p>
<!-- Section 1 -->
<h2 class="font-semibold mb-2">Built-in Animations</h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
  <div class="bg-white rounded shadow p-3 text-center">
    <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
    <p class="text-sm mt-2">spin</p>
  </div>
  <div class="bg-white rounded shadow p-3 text-center">
    <div class="w-8 h-8 bg-red-500 rounded-full animate-ping mx-auto"></div>
    <p class="text-sm mt-2">ping</p>
  </div>
  <div class="bg-white rounded shadow p-3 text-center">
    <div class="w-8 h-8 bg-gray-300 rounded mx-auto animate-pulse"></div>
    <p class="text-sm mt-2">pulse</p>
  </div>
  <div class="bg-white rounded shadow p-3 text-center">
    <div class="w-8 h-8 bg-green-500 rounded-full mx-auto animate-bounce"></div>
    <p class="text-sm mt-2">bounce</p>
  </div>
</div>

<!-- Section 2 -->
<h2 class="font-semibold mb-2">Button Animations</h2>
<div class="flex flex-wrap gap-3 mb-8">
  <button class="bg-blue-500 text-white px-3 py-2 rounded transition-transform duration-300 hover:scale-110">Scale</button>
  <button class="bg-red-500 text-white px-3 py-2 rounded shadow transition-all duration-300 hover:shadow-lg hover:scale-105">Shadow</button>
  <button class="bg-green-500 text-white px-3 py-2 rounded transition-colors duration-300 hover:bg-green-700">Color</button>
  <button class="bg-yellow-500 text-white px-3 py-2 rounded transition-transform duration-300 hover:rotate-6">Rotate</button>
  <button class="bg-gray-600 text-white px-3 py-2 rounded transition-transform duration-300 hover:-translate-y-1">Lift</button>
  <button class="bg-blue-600 text-white px-3 py-2 rounded transition-all duration-300 hover:scale-110 active:scale-95">Combo</button>
</div>

<!-- Section 3 -->
<h2 class="font-semibold mb-2">Card Animations</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-8">
  <div class="bg-white rounded shadow p-4 transition-all duration-300 hover:shadow-lg hover:-translate-y-1">
    <p class="text-sm">Hover lift</p>
  </div>
  <div class="group bg-white rounded shadow p-4">
    <div class="w-6 h-6 bg-red-400 rounded mb-1 group-hover:scale-125 transition-transform duration-300"></div>
    <p class="text-sm">Group hover</p>
  </div>
  <div class="bg-white rounded shadow p-4 border-2 border-transparent transition-all duration-300 hover:border-blue-500">
    <p class="text-sm">Border reveal</p>
  </div>
</div>

<!-- Section 4 -->
<h2 class="font-semibold mb-2">Notification Badges</h2>
<div class="flex gap-6 mb-8">
  <div class="relative w-10 h-10 bg-white rounded-full shadow flex items-center justify-center">
    🔔
    <span class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full animate-ping"></span>
  </div>
  <div class="relative w-10 h-10 bg-white rounded-full shadow flex items-center justify-center">
    💬
    <span class="absolute -top-1 -right-1 bg-blue-500 text-white text-xs rounded-full w-4 h-4 flex items-center justify-center">2</span>
  </div>
  <div class="relative w-10 h-10 bg-white rounded-full shadow flex items-center justify-center">
    📧
    <span class="absolute -top-1 -right-1 bg-green-500 rounded-full w-3 h-3 animate-bounce"></span>
  </div>
</div>

<!-- Section 5 -->
<h2 class="font-semibold mb-2">Loading States</h2>
<div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-8">
  <div class="bg-white rounded shadow p-3">
    <div class="h-3 bg-gray-300 rounded animate-pulse mb-2 w-3/4"></div>
    <div class="h-3 bg-gray-300 rounded animate-pulse"></div>
  </div>
  <div class="bg-white rounded shadow p-3 flex items-center justify-center">
    <button class="bg-blue-500 text-white px-3 py-1 rounded flex items-center gap-2 text-sm">
      <span class="w-3 h-3 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
      Loading
    </button>
  </div>
  <!-- dots use built-in animate-bounce plus tailwind's arbitrary value syntax for the delay -->
  <!-- this replaces the old style="animation-delay:.2s" inline attribute -->
  <div class="bg-white rounded shadow p-3 flex items-center justify-center gap-1">
    <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:0ms]"></span>
    <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:200ms]"></span>
    <span class="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:400ms]"></span>
  </div>
</div>

<!-- Section 6: Staggered Animations -->
<h2 class="font-semibold mb-2">Staggered Animations</h2>
<div class="grid grid-cols-2 md:grid-cols-4 gap-3">
  <div class="animate-fadeup [animation-delay:0ms] bg-white rounded shadow p-3 text-sm opacity-0">Card 1</div>
  <div class="animate-fadeup [animation-delay:150ms] bg-white rounded shadow p-3 text-sm opacity-0">Card 2</div>
  <div class="animate-fadeup [animation-delay:300ms] bg-white rounded shadow p-3 text-sm opacity-0">Card 3</div>
  <div class="animate-fadeup [animation-delay:450ms] bg-white rounded shadow p-3 text-sm opacity-0">Card 4</div>
</div>

</body>
</html>
